# Sync Postgres schema with prisma/schema.prisma (adds columns like stripeSubscriptionId, memberId on documents, etc.)
# Requires: GitHub secret DATABASE_URL. Optional: DATABASE_DIRECT_URL (Neon direct host — see lifeplan/docs/DATABASE_NEON.md).
# Trigger: Actions → "DB push and seed" → Run workflow
#
# Note: This file must live at repo root .github/workflows/ (not under lifeplan/).
# All npm/prisma commands run in the lifeplan/ subdirectory.

name: DB push and seed

on:
  workflow_dispatch:

# JS actions (checkout, setup-node) use Node 24+ per GitHub deprecation of Node 20 (see changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: lifeplan

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: lifeplan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "::error::DATABASE_URL is not set for this workflow."
            echo ""
            echo "GitHub Actions does NOT read Vercel env vars. Add the secret on GitHub:"
            echo "  1. Open THIS repo on GitHub (same repo that runs this workflow)."
            echo "  2. Settings → Secrets and variables → Actions → tab 'Secrets'."
            echo "  3. New repository secret → Name exactly: DATABASE_URL"
            echo "  4. Value: paste your Postgres URL from Vercel (Project → Settings → Environment Variables)"
            echo "     or Neon dashboard (Connection string). No quotes. Must start with postgresql://"
            echo "  5. Save, then run 'DB push and seed' again."
            echo ""
            echo "Doc: lifeplan/docs/RUN_DB_PUSH_AND_SEED.md"
            exit 1
          fi
          if [[ ! "$DATABASE_URL" =~ ^postgres(ql)?:// ]]; then
            echo "::error::DATABASE_URL must start with postgresql:// or postgres://"
            exit 1
          fi

      - name: Prisma generate, db push, seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
        run: |
          set -e
          export DATABASE_DIRECT_URL="${DATABASE_DIRECT_URL:-$DATABASE_URL}"
          npm run db:generate
          npm run db:push
          npx prisma db seed
