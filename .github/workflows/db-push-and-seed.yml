# Sync Postgres schema with prisma/schema.prisma (adds columns like stripeSubscriptionId, memberId on documents, etc.)
# Requires: GitHub secret DATABASE_URL (same as Vercel/Neon — postgresql://...)
# Trigger: Actions → "DB push and seed" → Run workflow
#
# Note: This file must live at repo root .github/workflows/ (not under lifeplan/).
# All npm/prisma commands run in the lifeplan/ subdirectory.

name: DB push and seed

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: lifeplan

jobs:
  db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lifeplan/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate DATABASE_URL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [[ -z "$DATABASE_URL" ]]; then
            echo "::error::DATABASE_URL secret is not set. Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [[ ! "$DATABASE_URL" =~ ^postgres(ql)?:// ]]; then
            echo "::error::DATABASE_URL must start with postgresql:// or postgres://"
            exit 1
          fi

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push

      - name: Prisma seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db seed
